services:
  - type: web
    name: bee-api
    runtime: node
    plan: free
    rootDir: bee_server
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma db push --skip-generate --accept-data-loss && node dist/main.js
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "3000"
      - key: NODE_ENV
        value: production
      - key: UPLOAD_BASE_URL
        sync: false

databases:
  - name: bee-db
    plan: free
