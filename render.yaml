services:
  - type: web
    name: bee-api
    runtime: node
    plan: free
    rootDir: bee_server
    buildCommand: npm install --omit=dev --legacy-peer-deps && npx prisma generate
    startCommand: node dist/main.js
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "3000"
      - key: NODE_ENV
        value: production

databases:
  - name: bee-db
    plan: free
