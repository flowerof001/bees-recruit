services:
  - type: web
    name: bee-api
    runtime: docker
    plan: free
    dockerfilePath: ./bee_server/Dockerfile
    dockerContext: ./bee_server
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "3000"
      - key: NODE_ENV
        value: production
      - key: UPLOAD_BASE_URL
        sync: false

databases:
  - name: bee-db
    plan: free
